<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NetHub - Registrar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Registrar Nuevo Contacto</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %} {{ form.as_p }}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'lista_contactos' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar Contacto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
