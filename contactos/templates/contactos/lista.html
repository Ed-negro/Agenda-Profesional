<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NetHub - Mis Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>NetHub: Agenda Profesional</h2>
            <a href="{% url 'crear_contacto' %}" class="btn btn-primary">+ Nuevo Contacto</a>
        </div>
        
        <div class="row">
            {% for contacto in contactos %}
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ contacto.nombre }}</h5>
                        <p class="card-text mb-1"><strong>Empresa:</strong> {{ contacto.empresa|default:"Ninguna" }}</p>
                        <p class="card-text text-muted small">{{ contacto.correo }}</p>
                        <span class="badge bg-secondary">{{ contacto.habilidades }}</span>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <div class="alert alert-info text-center">No hay contactos registrados aún.</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
